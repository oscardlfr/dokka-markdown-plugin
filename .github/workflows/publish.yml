name: Publish

# ──────────────────────────────────────────────────────────────────────────────
# Publishes com.androidcommondoc:dokka-markdown-plugin to GitHub Packages.
#
# Triggered by:
#   - Tag push (v*)                — publishes a versioned release
#   - Push to main                 — publishes a snapshot
#   - Manual workflow_dispatch
# ──────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      snapshot:
        description: 'Publish as snapshot (true) or use tag version (false)'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Run tests
        run: ./gradlew test --no-daemon

  publish:
    name: Publish to GitHub Packages
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="0.1.0-SNAPSHOT-${SHORT_SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Publish
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publish -Pversion=${{ steps.version.outputs.version }} --no-daemon

      - name: Summary
        run: |
          echo "### Dokka Markdown Plugin Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: \`${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Registry**: [GitHub Packages](https://github.com/oscardlfr/dokka-markdown-plugin/packages)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Coordinate**: \`com.androidcommondoc:dokka-markdown-plugin:${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
